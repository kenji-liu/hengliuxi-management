services:
  - type: web
    name: hengliuxi-management
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production

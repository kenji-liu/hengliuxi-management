  <script>
  /* ===== 字體大小循環切換 ===== */
  (function() {
    const SIZES = [
      { key: 'xs', label: 'A−−', title: '最小字體 90%' },
      { key: 'sm', label: 'A−',  title: '小字體 100%' },
      { key: 'md', label: 'A',   title: '標準字體' },
      { key: 'lg', label: 'A+',  title: '大字體' }
    ];
    const STORE_KEY = 'hengliuxi_fontsize';

    function applySize(key) {
      document.documentElement.setAttribute('data-font', key);
      const s = SIZES.find(x => x.key === key) || SIZES[2];
      const lbl = document.getElementById('fontSizeLabel');
      const btn = document.getElementById('fontSizeBtn');
      if (lbl) lbl.textContent = s.label;
      if (btn) btn.title = s.title;
      localStorage.setItem(STORE_KEY, key);
    }

    // 載入儲存的設定（或依螢幕寬自動選預設值）
    const saved = localStorage.getItem(STORE_KEY);
    if (saved && SIZES.find(x => x.key === saved)) {
      applySize(saved);
    } else {
      // iPad 11 (≤1194px) 預設 'md'(100%)；桌面預設 'lg'(130%)
      applySize(window.innerWidth <= 1194 ? 'md' : 'lg');
    }

    window.cycleFontSize = function() {
      const cur = document.documentElement.getAttribute('data-font') || 'md';
      const idx = SIZES.findIndex(x => x.key === cur);
      const next = SIZES[(idx + 1) % SIZES.length];
      applySize(next.key);
    };
  })();

  /* ===== 即時同步初始化（頁面完全載入後啟動） ===== */
  window.addEventListener('load', () => {
    // 稍延遲確保 DB 和所有模組已就緒
    setTimeout(() => {
      CloudSync.init().then(ok => {
        if (ok) console.log('[App] 即時同步已啟動');
      });
    }, 1500);
  });
  </script>
